<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>Домен припаркован в Казахстане - PS.kz</title>
  <meta content="хостинг, домены kz, хостинг казахстан, хостинг в казахстане, парковка домена" name="keywords">
  <meta content="Профессионально оказываем услуги хостинга с 2003 года. Собственный дата-центр в Алматы (Казахстан). Зарегистрируйтесь и покупайте хостинг и домены онлайн." name="description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #e6ebef;
      font-family: "Open Sans", sans-serif;
      display: flex;
      align-items: start;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container{
      width: 742px;
      margin-left: auto;
      margin-right: auto;
      padding: 15px 15px 0;
    }
    .wrapper{
      display: flex;
      justify-content: space-between;
    }
    .title{
      max-width: 100%;
      margin-bottom: 35px;
    }
    .description{
      max-width: 100%;
      margin-bottom: 35px;
      font-size: 18px;
      line-height: 27px;
      color: #3e515b;
      font-weight: 400;
      text-align: center;
    }
    h1{
      font-size: 32px;
      color: #2a2c36;
      font-weight: 700;
      text-align: center;
    }
    .white-block{
      position: relative;
      width: 100%;
      border-radius: 40px;
      margin-bottom: 50px;
      padding: 25px 20px;
      background-color: #fff;
      z-index: 0;
      overflow: hidden;
    }
    .white-block-text{
      font-size: 18px;
      line-height: 30px;
      color: #3e515b;
      font-weight: normal;
      position: relative;
      z-index: 1;
    }
    .white-block-img{
      position: absolute;
      top: 0;
      left: 0;
      width: fit-content;
      height: 100%;
      z-index: -1;
    }
    .link{
      color: inherit;
      text-decoration: underline;
      text-decoration-color: #20a8d8;
      text-underline-offset: 5px;
      text-decoration-thickness: 1px;
      cursor: pointer;
      border-bottom: none;
      text-wrap: nowrap;
    }
    .language-switch {
      margin-bottom: 65px;
      display: inline-flex;
      background: #f2f5f7;
      border-radius: 7px;
      padding: 3px;
      gap: 3px;
    }
    .language-switch label {
      padding: 6px 16px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #4a4a4a;
      border-radius: 5px;
    }
    .language-switch input {
      display: none;
    }
    .language-switch input:checked + label {
      background: white;
    }
    .img{
      display: none;
      position: relative;
    }
    .img-main {
      width: 423px;
      height: auto;
      position: absolute;
      right: -80px;
    }
    .img-bg{
      position: absolute;
      top: -370px;
      left: -330px;
      z-index: -1;
    }
    @media (min-width: 400px) { /*xs*/
      .white-block{
        padding: 35px 30px;
      }
      .wrapper{
        display: block;
        min-height: 310px;
      }
      .language-switch{
        margin-bottom: 65px;
      }
    }
    @media (min-width: 576px) { /*sm*/
      .white-block{
        padding: 45px 40px;
      }
      .wrapper{
        min-height: 370px;
      }
      .language-switch{
        margin-bottom: 80px;
      }
    }
    @media (min-width: 768px) { /*md*/
      .img {
        display: block;
      }
      .img-main{
        right: -70px;
        top: 15px;
      }
      .white-block{
        padding: 55px 50px;
      }
      .title{
        max-width: 400px;
      }
      h1{
        text-align: start;
      }
      .description{
        max-width: 400px;
        text-align: start;
      }
      .wrapper{
        display: flex;
        justify-content: space-between;
      }
    }
    @media (min-width: 992px) { /*lg*/
      .container{
        width: 962px;
      }
      .img-main{
        width: 550px;
        height: auto;
        top: 20px;
        right: -60px;
      }
      .img-bg{
        top: -300px;
        left: -455px;
      }
      h1{
        font-size: 42px;
      }
      .title {
        max-width: 500px;
        margin-bottom: 45px;
      }
      .description{
        margin-bottom: 75px;
      }
      .white-block{
        padding: 65px 60px;
      }
      .wrapper{
        min-height: 520px;
      }
      .language-switch{
        margin-bottom: 125px;
      }
    }
    @media (min-width: 1200px) { /*xl*/
      .container{
        width: 1162px;
      }
      .white-block{
        padding: 85px 80px;
      }
      .wrapper{
        min-height: 500px;
      }
      .img-main{
        width: 650px;
        height: 465px;
        top: -20px;
        right: -130px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wrapper">
      <div class="content">
        <div class="language-switch">
          <input type="radio" id="ru" name="language" checked>
          <label for="ru">РУС</label>
          <input type="radio" id="kz" name="language">
          <label for="kz">ҚАЗ</label>
          <!-- <input type="radio" id="uz" name="language">
          <label for="uz">O'ZB</label> -->
          <input type="radio" id="en" name="language">
          <label for="en">ENG</label>
        </div>
        <div class="title">
          <h1 id="title"></h1>
        </div>
        <div class="description">
          <p id="description"></p>
        </div>
      </div>
      <div class="img">
        <img src='https://psassets.object.pscloud.io/hosting-off.png' class="img-main" />
        <img src='https://psassets.object.pscloud.io/parking-bg.svg' class="img-bg" />
      </div>
    </div>
    <div class="white-block">
      <p id="white-block" class="white-block-text"></p>
      <img src="https://psassets.object.pscloud.io/ps-bg.svg" class="white-block-img">
    </div>
  </div>

  <script>
    const translations = {
      ru: {
        title: "Хостинг&nbspэтого сайта&nbsp;отключен",
        description: `Если вы посетитель, попробуйте зайти на&nbsp;сайт позднее`,
        whiteBlock: `<b><a class="link" href="https://www.ps.kz/">PS Cloud Services</a></b> предоставляет
          <a class="link" href="https://www.ps.kz/hosting/shared">хостинг в Казахстане</a>
          для сайтов любого уровня сложности и посещаемости. На нашем сайте PS.kz вам
          доступна <a class="link" href="https://www.ps.kz/domains">регистрация доменов</a> в зоне .kz и в других популярных зонах.
          Мы работаем с 2003 года и <a class="link" href="mailto:support@ps.kz">оказываем техническую</a> поддержку в
          режиме 24/7.`
      },
      kz: {
        title: "Бұл&nbspсайттың хостингі&nbspөшірулі",
        description: `Егер сіз қолданушы болсаңыз, сайтқа біраздан кейін қайта кіріңіз`,
        whiteBlock: `<b><a class="link " href="https://www.ps.kz/">PS Cloud Services</a></b>
          әр түрлі деңгейдегі жобаларға арналған
          <a class="link" href="https://www.ps.kz/hosting/shared">хостинг</a> жүргізу бойынша қызмет көрсетеді.
          Біздің PS.kz сайтымызда сіз .kz –те немесе басқа аймақтарда
          <a class="link" href="https://www.ps.kz/domains">домен тіркей аласыз</a>.
          Біз 2003 жылдан бері еңбек етіп, 24/7 тәулік бойы <a class="link" href="mailto:support@ps.kz">
           техникалық қызмет</a> көрсетеміз.`
      },
      en: {
        title: "Hosting of&nbspthis site&nbspis&nbspdisabled",
        description: `If you are a visitor, try to visit the site later.`,
        whiteBlock: `<b><a class="link " href="https://www.ps.kz/">PS Cloud Services</a></b>
          provides <a class="link" href="https://www.ps.kz/hosting/shared">hosting services</a>
          in Kazakhstan for websites of any complexity and attendance level.
          At our website PS.kz you can <a class="link" href="https://www.ps.kz/domains">register a domain name</a>
          in .kz domain zone and other popular zones. We are working since 2003 and provide 24/7
          <a class="link" href="mailto:support@ps.kz">technical support</a>.`
      }
    };

    function setLanguage(language) {
      document.getElementById("title").innerHTML = translations[language].title;
      document.getElementById("description").innerHTML = translations[language].description;
      document.getElementById("white-block").innerHTML = translations[language].whiteBlock;
    }
    setLanguage('ru');

    document.querySelectorAll('input[name="language"]').forEach(input => {
      input.addEventListener('change', () => {
        const selectedLang = input.id;
        setLanguage(selectedLang);
      });
    });
  </script>
</body>
</html>
